<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Products</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: body"></div>

<div class="container mt-3">
  <div class="d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Products</h5>
    <form class="d-flex" th:action="@{/products}" method="get">
      <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="Search" th:value="${q}">
      <button class="btn btn-outline-success btn-sm" type="submit">Search</button>
    </form>
  </div>

  <div class="mt-3">
    <a class="btn btn-primary btn-sm" th:href="@{/products/create}">Create New Product</a>
  </div>

  <div class="table-responsive mt-3">
    <table class="table table-bordered align-middle">
      <thead class="table-light">
      <tr>
        <th style="width:60px;">#</th>
        <th>Name</th>
        <th style="width:120px;">Price</th>
        <th style="width:140px;">Image</th>
        <th style="width:160px;">Category Name</th>
        <th style="width:140px;">Action</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="p,st : ${products}">
        <td th:text="${st.count}">1</td>
        <td th:text="${p.name}">name</td>
        <td th:text="${p.price}">30000</td>
        <td>
          <img th:if="${p.imageName != null}" th:src="@{'/uploads/' + ${p.imageName}}"
               style="width:90px;height:55px;object-fit:cover;border:1px solid #ddd;">
        </td>
        <td th:text="${p.category.name}">Laptop</td>
        <td>
          <a class="btn btn-secondary btn-sm" th:href="@{/products/edit/{id}(id=${p.id})}">Edit</a>
          <form th:action="@{/products/delete/{id}(id=${p.id})}" method="post" style="display:inline;">
            <button class="btn btn-danger btn-sm" type="submit"
                    onclick="return confirm('Xóa sản phẩm này?')">Delete</button>
          </form>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(products)}">
        <td colspan="6" class="text-center text-muted">No data</td>
      </tr>
      </tbody>
    </table>
  </div>

  <div class="text-center text-muted small mt-4">
    © 2025 - Phát triển ứng dụng với J2EE
  </div>
</div>

</body>
</html>
